<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — AlumniPortal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="/assets/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #f0f0ff; overflow-x: hidden; }

    .navbar {
      height: 64px; background: #111118; border-bottom: 1px solid #2a2a3d;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px; position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .profile-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
      display: flex; align-items: center; justify-content: center;
    }

    .container { display: flex; min-height: calc(100vh - 64px); }

    .sidebar {
      width: 240px; background: #111118; border-right: 1px solid #2a2a3d;
      padding: 20px 14px; display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar button {
      padding: 11px 16px; border: none; background: transparent; color: #8888aa;
      font-size: 0.95rem; font-weight: 600; text-align: left; border-radius: 8px;
      cursor: pointer; transition: all 0.25s; font-family: 'Outfit';
    }
    .sidebar button:hover { background: rgba(255,255,255,0.05); color: #f0f0ff; }
    .sidebar button.active { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

    .content { flex: 1; padding: 32px; display: flex; justify-content: center; }

    .card {
      background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 16px;
      padding: 32px; width: 100%; max-width: 820px;
    }
    .card h2 {
      font-size: 1.4rem; font-weight: 700; margin-bottom: 22px;
      padding-bottom: 14px; border-bottom: 1px solid #2a2a3d; color: #f0f0ff;
    }

    /* Profile Pic */
    .profile-pic-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; gap: 14px; }
    .profile-pic-preview {
      width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
      background: rgba(124,58,237,0.15); border: 3px solid rgba(124,58,237,0.4);
    }
    .profile-pic-controls { display: flex; gap: 10px; }
    .pic-btn {
      background: transparent; border: 1px solid #2a2a3d; padding: 7px 14px;
      border-radius: 7px; cursor: pointer; font-size: 0.82rem; font-family: 'Outfit';
      color: #8888aa; transition: all 0.2s;
    }
    .pic-btn:hover { background: rgba(255,255,255,0.05); color: #f0f0ff; }
    .pic-btn.remove { color: #ef4444; border-color: rgba(239,68,68,0.4); }
    .pic-btn.remove:hover { background: rgba(239,68,68,0.1); }

    /* Profile Grid */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full-width { grid-column: span 2; }
    .form-group label { font-size: 0.82rem; color: #8888aa; font-weight: 600; }

    input, textarea {
      background: #0f0f1a; border: 1px solid #2a2a3d; color: #f0f0ff;
      padding: 11px 13px; border-radius: 8px; font-family: 'Outfit'; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    input::placeholder, textarea::placeholder { color: #55556a; }
    input:focus, textarea:focus { border-color: #7c3aed; background: #13131f; }
    input:disabled { background: rgba(255,255,255,0.03); color: #8888aa; cursor: not-allowed; border-color: #2a2a3d; }
    textarea { resize: vertical; min-height: 80px; }

    .save-btn {
      background: #7c3aed; color: #fff; padding: 12px; width: 100%;
      border: none; border-radius: 9px; font-weight: 700; font-size: 1rem;
      cursor: pointer; font-family: 'Outfit'; margin-top: 22px; transition: all 0.25s;
      box-shadow: 0 0 20px rgba(124,58,237,0.3);
    }
    .save-btn:hover { background: #6d28d9; box-shadow: 0 0 30px rgba(124,58,237,0.5); transform: translateY(-1px); }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .profile-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">AlumniPortal Pro</div>
    <div class="profile-avatar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
  </div>

  <div class="container">
    <div class="sidebar">
      <button onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
      <button class="active">👤 Profile</button>
    </div>

    <div class="content">
      <div class="card">
        <h2>My Profile</h2>
        <div class="profile-pic-container">
          <img id="profPicPreview" class="profile-pic-preview" src="" style="display:none;">
          <div id="profPicFallback" class="profile-pic-preview" style="display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#a78bfa;">👤</div>
          <div class="profile-pic-controls">
            <input type="file" id="picUpload" accept="image/*" style="display:none;" onchange="handlePicUpload(event)">
            <button class="pic-btn" onclick="document.getElementById('picUpload').click()">Upload Image</button>
            <button class="pic-btn remove" onclick="removePic()">Remove</button>
          </div>
        </div>

        <div class="profile-grid">
          <div class="form-group"><label>Name</label><input type="text" id="profName"></div>
          <div class="form-group"><label>Email</label><input type="email" id="profEmail" disabled></div>
          <div class="form-group"><label>Role</label><input type="text" id="profRole" disabled></div>
          <div class="form-group"><label>College ID</label><input type="text" id="profCollegeId" disabled></div>
          <div class="form-group"><label>Graduation Year</label><input type="number" id="profGradYear"></div>
          <div class="form-group"><label>Phone Number</label><input type="tel" id="profPhone" placeholder="+1 234 567 8900"></div>
          <div class="form-group"><label>LinkedIn Profile</label><input type="url" id="profLinkedin" placeholder="https://linkedin.com/in/..."></div>
          <div class="form-group"><label>Course / Major</label><input type="text" id="profCourse" placeholder="e.g. B.Tech Computer Science"></div>
          <div class="form-group"><label>Current Company</label><input type="text" id="profCompany" placeholder="Where do you work?"></div>
          <div class="form-group"><label>Current Job Post</label><input type="text" id="profJobPost" placeholder="e.g. Software Engineer"></div>
          <div class="form-group full-width"><label>Work Experience</label><textarea id="profExperience" placeholder="Describe your relevant work history..."></textarea></div>
          <div class="form-group full-width"><label>Bio</label><textarea id="profBio" placeholder="Tell us a little about yourself..."></textarea></div>
        </div>
        <button class="save-btn" id="saveProfileBtn">Update Profile</button>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = `${window.location.origin}/api/users`;
    const userId = localStorage.getItem("userId");
    if (!userId) window.location.href = "../index.html";

    async function loadProfile() {
      try {
        const res = await apiFetch(`${BASE_URL}/${userId}`);
        const user = await res.json();
        if (user.error) { alert("Unable to fetch user details. " + user.error); return; }
        document.getElementById("profName").value = user.name || "";
        document.getElementById("profEmail").value = user.email || "";
        document.getElementById("profRole").value = (user.role || "").toUpperCase();
        document.getElementById("profCollegeId").value = user.collegeId || "N/A";
        document.getElementById("profGradYear").value = user.graduationYear || "";
        document.getElementById("profPhone").value = user.phone || "";
        document.getElementById("profLinkedin").value = user.linkedin || "";
        document.getElementById("profCourse").value = user.course || "";
        document.getElementById("profCompany").value = user.company || "";
        document.getElementById("profJobPost").value = user.jobPost || "";
        document.getElementById("profExperience").value = user.workExperience || "";
        document.getElementById("profBio").value = user.bio || "";
        currentProfilePic = user.profilePic || "";
        renderPic();
      } catch (err) { console.error("Failed to load profile", err); }
    }

    document.getElementById("saveProfileBtn").addEventListener("click", async () => {
      const payload = {
        name: document.getElementById("profName").value,
        graduationYear: Number(document.getElementById("profGradYear").value),
        phone: document.getElementById("profPhone").value,
        linkedin: document.getElementById("profLinkedin").value,
        course: document.getElementById("profCourse").value,
        company: document.getElementById("profCompany").value,
        jobPost: document.getElementById("profJobPost").value,
        workExperience: document.getElementById("profExperience").value,
        bio: document.getElementById("profBio").value,
        profilePic: currentProfilePic
      };
      try {
        const res = await apiFetch(`${BASE_URL}/${userId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.error) alert("Update failed: " + result.error);
        else { alert("Profile updated successfully!"); localStorage.setItem("name", payload.name); }
      } catch (err) { console.error(err); alert("Action failed, please check console."); }
    });

    let currentProfilePic = "";

    function handlePicUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => { currentProfilePic = e.target.result; renderPic(); };
      reader.readAsDataURL(file);
    }

    function removePic() { currentProfilePic = ""; renderPic(); }

    function renderPic() {
      if (currentProfilePic) {
        document.getElementById("profPicPreview").src = currentProfilePic;
        document.getElementById("profPicPreview").style.display = "block";
        document.getElementById("profPicFallback").style.display = "none";
      } else {
        document.getElementById("profPicPreview").style.display = "none";
        document.getElementById("profPicFallback").style.display = "flex";
      }
    }

    loadProfile();
  </script>
</body>
</html>
