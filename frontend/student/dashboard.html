<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — AlumniPortal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="/assets/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #f0f0ff; overflow: hidden; }

    .navbar {
      height: 64px; background: #111118; border-bottom: 1px solid #2a2a3d;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px; position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .profile-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .profile-avatar:hover { background: rgba(124,58,237,0.35); transform: scale(1.05); }

    .container { display: flex; height: calc(100vh - 64px); }

    .sidebar {
      width: 240px; background: #111118; border-right: 1px solid #2a2a3d;
      padding: 20px 14px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }
    .sidebar button {
      padding: 11px 16px; border: none; background: transparent; color: #8888aa;
      font-size: 0.95rem; font-weight: 600; text-align: left; border-radius: 8px;
      cursor: pointer; transition: all 0.25s; font-family: 'Outfit';
    }
    .sidebar button:hover { background: rgba(255,255,255,0.05); color: #f0f0ff; }
    .sidebar button.active { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

    .content { flex: 1; padding: 28px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2a2a3d transparent; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: #2a2a3d; border-radius: 3px; }

    /* GREETING */
    .greeting {
      background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 14px;
      padding: 22px 26px; margin-bottom: 22px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .greeting h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .greeting p, .greeting-right { color: #8888aa; font-size: 0.88rem; }
    .greeting-right { text-align: right; line-height: 1.6; }
    .greeting-right strong { color: #f0f0ff; }

    /* MAIN GRID LAYOUT */
    .dashboard-layout {
      display: flex; gap: 20px; align-items: flex-start;
    }
    
    /* LEFT COLUMN */
    .left-col { flex: 1; display: flex; flex-direction: column; gap: 20px; }
    
    /* RIGHT COLUMN (Vertical Slideshow & Funding) */
    .right-col { width: 320px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }

    .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .card {
      background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 14px;
      padding: 22px; display: flex; flex-direction: column;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover { border-color: rgba(124,58,237,0.35); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .card h3 {
      margin-bottom: 14px; font-size: 0.85rem; font-weight: 700; color: #8888aa;
      text-transform: uppercase; letter-spacing: 0.8px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* VERTICAL SLIDESHOW */
    .v-slideshow {
      width: 100%; height: 350px; position: relative; border-radius: 14px; overflow: hidden;
      border: 1px solid #2a2a3d; background: #000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .v-slide {
      width: 100%; height: 100%; position: absolute; inset: 0;
      opacity: 0; transition: opacity 1s ease-in-out;
      background-size: cover; background-position: center;
    }
    .v-slide.active { opacity: 1; }

    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .list-wrapper { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
    .list-item {
      background: rgba(255,255,255,0.03); border: 1px solid #2a2a3d;
      border-left: 3px solid #7c3aed; padding: 11px 13px; border-radius: 8px;
    }
    .list-item.event { border-left-color: #f59e0b; }
    .list-item p { font-size: 0.92rem; color: #f0f0ff; margin: 0; }
    .list-item span { font-size: 0.78rem; color: #8888aa; }

    @media (max-width: 1024px) {
      .dashboard-layout { flex-direction: column; }
      .right-col { width: 100%; }
      .v-slideshow { height: 250px; }
    }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .grid-row { grid-template-columns: 1fr; }
      .greeting { flex-direction: column; gap: 12px; }
      .greeting-right { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">AlumniPortal Pro</div>
    <div class="profile-avatar" title="My Profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
  </div>

  <div class="container">
    <div class="sidebar">
      <button class="active">📊 Dashboard</button>
      <button onclick="window.location.href='../find-mentor.html'">🧑‍🏫 Find Mentor</button>
      <button onclick="window.location.href='../find-alumni.html'">🔍 Find Alumni</button>
      <button onclick="window.location.href='../opportunities.html'">💼 Opportunities</button>
      <button onclick="window.location.href='../events.html'">🎉 Events</button>
      <button onclick="logout()" style="margin-top: auto; color: #ef4444;">⬅ Logout</button>
    </div>

    <div class="content">
      <div id="dashboardView">
        <div class="greeting">
          <div>
            <h2 id="greetingMsg">Good Morning, Student</h2>
            <p>Welcome back — have a great day!</p>
          </div>
          <div class="greeting-right">
            <strong>CSE | Full Stack Web Development</strong><br>
            Lovely Professional University
          </div>
        </div>

        <div class="dashboard-layout">
          <!-- LEFT COLUMN -->
          <div class="left-col">
            <div class="grid-row">
              <div class="card">
                <h3>Booked Sessions</h3>
                <div class="list-wrapper" id="meetingsList">
                  <div class="list-item"><p>Loading sessions...</p></div>
                </div>
              </div>

              <div class="card">
                <h3>Jobs Activity</h3>
                <div class="list-wrapper" id="activityList">
                  <div class="list-item"><p>Loading activity...</p></div>
                </div>
              </div>
            </div>

            <div class="card" style="flex:1;">
              <h3>Job Notifications <span class="live-dot"></span></h3>
              <div class="list-wrapper" id="notificationsList">
                <div class="list-item"><p>Loading jobs...</p></div>
              </div>
            </div>
          </div>

          <!-- RIGHT COLUMN -->
          <div class="right-col">
            <!-- Vertical Slideshow -->
            <div class="v-slideshow">
              <div class="v-slide active" style="background-image: url('../assets/alumni_poster/Screenshot%202026-04-19%20151408.png')"></div>
              <div class="v-slide" style="background-image: url('../assets/alumni_poster/Screenshot%202026-04-19%20151354.png')"></div>
            </div>

            <div class="card" style="flex:1;">
              <h3>Funding Received</h3>
              <div class="list-wrapper" id="fundingList">
                <div class="list-item"><p>Loading donations...</p></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = `${window.location.origin}/api`;
    const userId = localStorage.getItem("userId");
    if (!userId) { window.location.href = "../index.html"; }

    async function logout() {
      await apiFetch(`${BASE_URL}/users/logout`, { method: "POST" });
      localStorage.clear();
      window.location.href = "../index.html";
    }

    function updateGreeting() {
      const name = localStorage.getItem("name") || "Student";
      const h = new Date().getHours();
      const g = h < 12 ? "Good Morning" : h < 18 ? "Good Afternoon" : "Good Evening";
      document.getElementById("greetingMsg").innerText = `${g}, ${name}!`;
    }
    updateGreeting();

    async function fetchMeetings() {
      if (!userId) return;
      try {
        const res = await apiFetch(`${BASE_URL}/meetings/${userId}`);
        const meets = await res.json();
        const box = document.getElementById("meetingsList");
        box.innerHTML = meets.length ? "" : `<div class="list-item"><p>No booked sessions.</p></div>`;
        meets.forEach(m => {
          const date = new Date(m.date).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
          box.innerHTML += `<div class="list-item"><p><strong>Meet with: ${m.alumniId ? m.alumniId.name : "Mentor"}</strong></p><span>${date} · Status: ${m.status}</span></div>`;
        });
      } catch (err) { console.error(err); }
    }

    async function fetchActivity() {
      if (!userId) return;
      try {
        const res = await apiFetch(`${BASE_URL}/applications/${userId}`);
        const apps = await res.json();
        const box = document.getElementById("activityList");
        box.innerHTML = apps.length ? "" : `<div class="list-item"><p>No job applications yet.</p></div>`;
        apps.forEach(a => {
          const date = new Date(a.createdAt).toLocaleDateString();
          box.innerHTML += `<div class="list-item"><p><strong>${a.postId ? a.postId.title : "Unknown Job"}</strong></p><span>Applied: ${date} · Status: ${a.status}</span></div>`;
        });
      } catch (err) { console.error(err); }
    }

    async function fetchJobs() {
      try {
        const res = await apiFetch(`${BASE_URL}/posts`);
        const posts = await res.json();
        const box = document.getElementById("notificationsList");
        box.innerHTML = posts.length ? "" : `<div class="list-item"><p>No jobs found.</p></div>`;
        posts.forEach(p => {
          const t = p.postType === "internship" ? "Internship" : "Job";
          box.innerHTML += `<div class="list-item"><p><strong>${p.title} (${t})</strong></p><span>Location: ${p.location || "N/A"}</span></div>`;
        });
      } catch (err) { console.error(err); }
    }

    async function fetchDonations() {
      try {
        const res = await apiFetch(`${BASE_URL}/donations`);
        const dons = await res.json();
        const box = document.getElementById("fundingList");
        box.innerHTML = dons.length ? "" : `<div class="list-item"><p>No donations yet.</p></div>`;
        dons.forEach(d => {
          const name = d.userId ? d.userId.name : "Anonymous";
          const date = new Date(d.createdAt).toLocaleDateString();
          box.innerHTML += `<div class="list-item"><p><strong>${name}</strong> donated $${d.amount}</p><span>Cause: ${d.cause} · ${date}</span></div>`;
        });
      } catch (err) { console.error(err); }
    }

    fetchMeetings(); fetchActivity(); fetchJobs(); fetchDonations();

    // Vertical Slideshow
    const slides = document.querySelectorAll('.v-slide');
    let cur = 0;
    if (slides.length > 0) {
      setInterval(() => {
        slides[cur].classList.remove('active');
        cur = (cur + 1) % slides.length;
        slides[cur].classList.add('active');
      }, 3000);
    }
  </script>
</body>
</html>
