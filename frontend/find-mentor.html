<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Mentor — AlumniPortal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="/assets/js/api.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a0f;
      color: #f0f0ff;
    }

    .navbar {
      height: 64px;
      background: #111118;
      border-bottom: 1px solid #2a2a3d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back-btn {
      padding: 8px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a2a3d;
      border-radius: 8px;
      color: #8888aa;
      font-family: 'Outfit';
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: #7c3aed;
      color: #f0f0ff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtext {
      color: #8888aa;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .mentor-card {
      background: #1a1a27;
      border: 1px solid #2a2a3d;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.25s;
    }

    .mentor-card:hover {
      border-color: rgba(124, 58, 237, 0.35);
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.5);
    }

    .mc-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .mc-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(124, 58, 237, 0.4);
      object-fit: cover;
    }

    .mc-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0f0ff;
      margin: 0;
    }

    .mc-info p {
      margin: 3px 0 0;
      font-size: 0.82rem;
      color: #8888aa;
    }

    .mc-details {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #2a2a3d;
      padding: 14px;
      border-radius: 9px;
      margin-bottom: 18px;
    }

    .mc-detail-row {
      margin: 5px 0;
      font-size: 0.85rem;
      color: #8888aa;
    }

    .mc-detail-row strong {
      color: #f0f0ff;
    }

    .book-btn {
      width: 100%;
      padding: 11px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit';
      transition: all 0.25s;
      margin-top: auto;
      box-shadow: 0 0 16px rgba(124, 58, 237, 0.3);
    }

    .book-btn:hover {
      background: #6d28d9;
      box-shadow: 0 0 26px rgba(124, 58, 237, 0.55);
      transform: translateY(-1px);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #1a1a27;
      border: 1px solid #2a2a3d;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f0ff;
      margin-bottom: 6px;
    }

    .modal p {
      color: #8888aa;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .modal-form-group {
      margin-bottom: 14px;
    }

    .modal-form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.82rem;
      color: #8888aa;
    }

    .modal-form-group input {
      width: 100%;
      padding: 10px 13px;
      background: #0f0f1a;
      border: 1px solid #2a2a3d;
      color: #f0f0ff;
      border-radius: 8px;
      font-family: 'Outfit';
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-form-group input:focus {
      border-color: #7c3aed;
      background: #13131f;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .modal-btn {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit';
      transition: all 0.2s;
    }

    .modal-btn-cancel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a2a3d;
      color: #8888aa;
    }

    .modal-btn-cancel:hover {
      color: #f0f0ff;
      background: rgba(255, 255, 255, 0.08);
    }

    .modal-btn-submit {
      background: #10b981;
      color: #fff;
      box-shadow: 0 0 14px rgba(16, 185, 129, 0.3);
    }

    .modal-btn-submit:hover {
      background: #059669;
      box-shadow: 0 0 22px rgba(16, 185, 129, 0.5);
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">AlumniPortal Pro</div>
    <button class="back-btn" id="backBtn">← Return to Dashboard</button>
  </div>

  <div class="container">
    <h2>Find a Mentor 🧑‍🏫</h2>
    <p class="subtext">Connect with experienced alumni for guidance and career growth.</p>
    <div class="grid" id="mentorsGrid">Loading mentors...</div>
  </div>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <h3>Book Appointment</h3>
      <p>Request a slot with <strong id="modalMentorName">Mentor</strong></p>
      <div class="modal-form-group">
        <label>Requested Date</label>
        <input type="date" id="bookingDate">
      </div>
      <div class="modal-form-group">
        <label>Session Topic / Request</label>
        <input type="text" id="bookingTopic" placeholder="e.g. Resume Review request">
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="cancelModalBtn">Cancel</button>
        <button class="modal-btn modal-btn-submit" id="submitModalBtn">Request Booking</button>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = `${window.location.origin}/api`;
    const userId = localStorage.getItem("userId");
    if (!userId) { window.location.href = "index.html"; }
    let selectedMentorId = null;

    function goBack() {
      const role = localStorage.getItem("role");
      if (role === "admin") window.location.href = "admin/dashboard.html";
      else if (role === "alumni") window.location.href = "alumni/dashboard.html";
      else window.location.href = "student/dashboard.html";
    }

    document.getElementById("backBtn").addEventListener("click", goBack);
    document.getElementById("cancelModalBtn").addEventListener("click", closeModal);
    document.getElementById("submitModalBtn").addEventListener("click", submitBooking);

    document.getElementById("mentorsGrid").addEventListener("click", (e) => {
      if (e.target.classList.contains("book-btn")) {
        const id = e.target.getAttribute("data-id");
        const name = e.target.getAttribute("data-name");
        openModal(id, name);
      }
    });

    async function fetchMentors() {
      try {
        const res = await apiFetch(`${BASE_URL}/users/mentors/directory`);
        const mentors = await res.json();
        const grid = document.getElementById('mentorsGrid');
        grid.innerHTML = "";
        if (mentors.length === 0) { grid.innerHTML = `<p style="color:#8888aa">No active mentors available right now.</p>`; return; }
        mentors.forEach(m => {
          const pic = m.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=7c3aed&color=fff`;
          grid.innerHTML += `
            <div class="mentor-card">
              <div class="mc-header">
                <img src="${pic}" class="mc-avatar">
                <div class="mc-info">
                  <h3>${m.name}</h3>
                  <p>${m.course || 'Alumni'} | Class of ${m.graduationYear}</p>
                </div>
              </div>
              <div class="mc-details">
                <div class="mc-detail-row"><strong>Availability:</strong> ${m.mentorDay || 'Flexible'} (${m.mentorTime || 'Any'})</div>
                <div class="mc-detail-row"><strong>Email:</strong> ${m.mentorEmail || m.email}</div>
                ${m.mentorContact ? `<div class="mc-detail-row"><strong>Contact:</strong> ${m.mentorContact}</div>` : ''}
                ${m.mentorLink ? `<div class="mc-detail-row"><strong>Meet Link:</strong> <a href="${m.mentorLink}" target="_blank" style="color:#a78bfa;text-decoration:none;">View Link</a></div>` : ''}
              </div>
              <button class="book-btn" data-id="${m._id}" data-name="${m.name.replace(/"/g, '&quot;')}">Book Appointment</button>
            </div>`;
        });
      } catch (err) { console.error(err); }
    }

    function openModal(id, name) {
      selectedMentorId = id;
      document.getElementById('modalMentorName').innerText = name;
      document.getElementById('bookingModal').classList.add('active');
    }

    function closeModal() {
      selectedMentorId = null;
      document.getElementById('bookingDate').value = "";
      document.getElementById('bookingTopic').value = "";
      document.getElementById('bookingModal').classList.remove('active');
    }

    async function submitBooking() {
      if (!selectedMentorId) return;
      const dateVal = document.getElementById('bookingDate').value;
      const topicVal = document.getElementById('bookingTopic').value;
      if (!dateVal) return alert("Please select a date.");
      if (!topicVal) return alert("Please enter a topic.");
      try {
        await apiFetch(`${BASE_URL}/meetings/create`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ studentId: userId, alumniId: selectedMentorId, date: dateVal, topic: topicVal })
        });
        alert("Booking request submitted! The mentor will be notified.");
        closeModal();
      } catch (e) { console.error(e); alert("Failed to submit request."); }
    }

    fetchMentors();
  </script>
</body>

</html>
