<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlumniPortal Pro - Authentication</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Outfit', Arial, sans-serif;
    background: #f4f6f8;
    color: #333333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* Modal */
  .modal {
    background: #ffffff;
    padding: 40px;
    width: 380px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    border: 1px solid #e2e8f0;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    text-align: center;
    margin-top: 0;
    margin-bottom: 5px;
    font-size: 1.8rem;
    color: #0f172a;
    font-weight: 700;
  }
  
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 0.95rem;
    margin-top: 0;
    margin-bottom: 25px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    background: #f1f5f9;
    padding: 6px;
    border-radius: 12px;
  }

  .tabs button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    color: #64748b;
    font-family: 'Outfit', Arial, sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s ease;
  }

  .tabs button.hover {
    color: #0f172a;
  }

  .tabs button.active {
    background: #ffffff;
    color: #3b82f6;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
  }

  /* Inputs */
  input, select {
    width: 100%;
    margin: 8px 0;
    padding: 13px 15px;
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    color: #334155;
    border-radius: 10px;
    font-family: 'Outfit', Arial, sans-serif;
    outline: none;
    transition: border-color 0.3s ease;
    box-sizing: border-box;
  }
  
  input::placeholder { color: #94a3b8; }
  input:focus, select:focus { 
    border-color: #3b82f6; 
    background: #ffffff;
  }

  /* Button */
  button.submit {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
    font-family: 'Outfit', Arial, sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    transition: all 0.3s ease;
  }

  button.submit:hover {
    background: #2563eb;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    transform: translateY(-2px);
  }

  /* Hide */
  .hidden {
    display: none;
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 25px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    color: #334155;
    font-size: 0.95rem;
    font-weight: 600;
    border-left: 4px solid #3b82f6;
    transform: translateX(150%);
    transition: transform 0.3s ease;
    z-index: 1000;
    font-family: 'Outfit', Arial, sans-serif;
  }
  .toast.error {
    border-left-color: #ef4444;
  }
  .toast.success {
    border-left-color: #10b981;
  }
  .toast.show {
    transform: translateX(0);
  }
</style>
</head>

<body>

<div class="toast" id="toastMsg"></div>

<div class="modal">
  <h2>AlumniPortal Pro</h2>
  <p class="subtitle">Welcome to the network</p>
  <div class="tabs">
    <button id="loginTab" class="active">Login</button>
    <button id="signupTab">Signup</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <input id="loginId" placeholder="College ID / Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="submit" onclick="login()">Access Portal</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="hidden">
    <div class="tabs" style="margin-bottom: 15px; background: #e2e8f0;">
      <button id="roleStudentTab" class="active" onclick="setRole('student')" type="button">Student</button>
      <button id="roleAlumniTab" onclick="setRole('alumni')" type="button">Alumni</button>
    </div>
    <input type="hidden" id="signupRole" value="student">
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="collegeId" placeholder="College ID">
    <input id="year" type="number" placeholder="Graduation Year (e.g. 2024)" class="hidden">
    <input id="password" type="password" placeholder="Password">
    <button class="submit" onclick="signup()">Create Account</button>
  </div>

</div>

<script type="module">
const BASE_URL = "http://localhost:5000/api/users";

/* AUTO REDIRECT */
const storedRole = localStorage.getItem("role");
if (storedRole === "admin") window.location.href = "admin/dashboard.html";
else if (storedRole === "alumni") window.location.href = "alumni/dashboard.html";
else if (storedRole === "student") window.location.href = "student/dashboard.html";

/* TOAST NOTIFICATION */
const toast = document.getElementById("toastMsg");
window.showToast = (msg, type = 'success') => {
  toast.innerText = msg;
  toast.className = `toast show ${type}`;
  setTimeout(() => toast.classList.remove("show"), 3000);
};

/* TAB SWITCH */
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginTab.onclick = () => {
  loginForm.classList.remove("hidden");
  signupForm.classList.add("hidden");
  loginTab.classList.add("active");
  signupTab.classList.remove("active");
};

signupTab.onclick = () => {
  signupForm.classList.remove("hidden");
  loginForm.classList.add("hidden");
  signupTab.classList.add("active");
  loginTab.classList.remove("active");
};

/* SET ROLE */
window.setRole = (role) => {
  document.getElementById("signupRole").value = role;
  
  const studentTab = document.getElementById("roleStudentTab");
  const alumniTab = document.getElementById("roleAlumniTab");

  if (role === "student") {
    studentTab.classList.add("active");
    alumniTab.classList.remove("active");
  } else {
    alumniTab.classList.add("active");
    studentTab.classList.remove("active");
  }
  
  window.toggleSignupFields();
};

/* TOGGLE FIELDS */
window.toggleSignupFields = () => {
  const role = document.getElementById("signupRole").value;
  const collegeIdInput = document.getElementById("collegeId");
  const yearInput = document.getElementById("year");

  if (role === "student") {
    collegeIdInput.classList.remove("hidden");
    yearInput.classList.add("hidden");
  } else {
    collegeIdInput.classList.add("hidden");
    yearInput.classList.remove("hidden");
  }
};

/* SIGNUP */
window.signup = async () => {
  const role = document.getElementById("signupRole").value;
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: role
  };

  if (role === "student") {
    data.collegeId = document.getElementById("collegeId").value;
  } else {
    data.graduationYear = Number(document.getElementById("year").value);
  }

  try {
    const res = await fetch(`${BASE_URL}/register`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const result = await res.json();
    
    if (result.error) {
      showToast(result.error, 'error');
    } else {
      showToast(result.message || "Signup successful", 'success');
      setTimeout(() => loginTab.click(), 1000);
    }
  } catch (err) {
    showToast("Network error. Is backend running?", 'error');
  }
};

/* LOGIN */
window.login = async () => {
  const data = {
    loginId: document.getElementById("loginId").value,
    password: document.getElementById("loginPass").value
  };

  try {
    const res = await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.error) {
      showToast(result.error, 'error');
      return;
    }

    if (result.role) {
        showToast("Login successful! Redirecting...", 'success');
        localStorage.setItem("role", result.role);
        localStorage.setItem("name", result.name);
        localStorage.setItem("userId", result.userId);
        
        // redirect to index.html which routes according to role
        setTimeout(() => window.location.href = "index.html", 1000);
    }
  } catch (err) {
    showToast("Network error. Is backend running?", 'error');
  }
};
</script>

</body>
</html>
