<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Modal */
.modal {
  background: white;
  padding: 25px;
  width: 320px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* Tabs */
.tabs {
  display: flex;
  margin-bottom: 15px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  cursor: pointer;
  background: #ddd;
}

.tabs button.active {
  background: black;
  color: white;
}

/* Inputs */
input {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
}

/* Button */
button.submit {
  width: 100%;
  padding: 10px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* Hide */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="modal">

  <div class="tabs">
    <button id="loginTab" class="active">Login</button>
    <button id="signupTab">Signup</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <input id="loginId" placeholder="College ID">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="submit" onclick="login()">Login</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="hidden">
    <input id="name" placeholder="Name">
    <input id="collegeId" placeholder="College ID">
    <input id="email" placeholder="College Email">
    <input id="year" placeholder="Graduation Year">
    <input id="password" type="password" placeholder="Password">
    <button class="submit" onclick="signup()">Signup</button>
  </div>

</div>

<script type="module">
const BASE_URL = "http://localhost:5000/api/users";

/* TAB SWITCH */
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginTab.onclick = () => {
  loginForm.classList.remove("hidden");
  signupForm.classList.add("hidden");
  loginTab.classList.add("active");
  signupTab.classList.remove("active");
};

signupTab.onclick = () => {
  signupForm.classList.remove("hidden");
  loginForm.classList.add("hidden");
  signupTab.classList.add("active");
  loginTab.classList.remove("active");
};

/* SIGNUP */
window.signup = async () => {
  const data = {
    name: name.value,
    collegeId: collegeId.value,
    email: email.value,
    graduationYear: Number(year.value),
    password: password.value
  };

  const res = await fetch(`${BASE_URL}/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message || result.error);

  // switch to login after signup
  loginTab.click();
};

/* LOGIN */
window.login = async () => {
  const data = {
    collegeId: loginId.value,
    password: loginPass.value
  };

  const res = await fetch(`${BASE_URL}/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.error) {
    alert(result.error);
    return;
  }

  // store role
  localStorage.setItem("role", result.role);

  // redirect to home page
  window.location.href = "index.html";
};
</script>

</body>
</html>
