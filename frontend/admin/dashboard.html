<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — AlumniPortal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { font-family:'Outfit',sans-serif; background:#0a0a0f; color:#f0f0ff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; gap:16px; }
    .logo { font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,#a78bfa,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    h1 { font-size:1.3rem; font-weight:700; }
    p { color: #8888aa; font-size:0.95rem; }
    .logout-btn { padding:10px 26px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#ef4444; font-family:'Outfit'; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; }
    .logout-btn:hover { background:rgba(239,68,68,0.2); }
  </style>
</head>
<body>
  <div class="logo">AlumniPortal Pro</div>
  <h1>Admin Dashboard</h1>
  <p>Admin panel is under construction.</p>
  <button class="logout-btn" onclick="localStorage.clear(); window.location.href='../index.html'">Logout</button>
  <script>
    const userId = localStorage.getItem("userId");
    if (!userId) { window.location.href = "../index.html"; }
  </script>
</body>
</html>
