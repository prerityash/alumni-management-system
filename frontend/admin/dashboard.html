<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AlumniPortal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="/assets/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #f0f0ff; min-height: 100vh; }

    /* HEADER */
    header {
      background: #111118; border-bottom: 1px solid #2a2a3d;
      padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.2rem; font-weight: 800; color: #a78bfa; }
    .admin-tag { font-size: 0.75rem; color: #f87171; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); padding: 3px 10px; border-radius: 20px; margin-left: 10px; }
    .logout-btn { padding: 8px 18px; background: transparent; border: 1px solid #2a2a3d; color: #8888aa; border-radius: 8px; cursor: pointer; font-family: 'Outfit'; font-size: 0.88rem; transition: all 0.2s; }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* TABS */
    .tabs { background: #111118; border-bottom: 1px solid #2a2a3d; padding: 0 32px; display: flex; gap: 4px; }
    .tab-btn { padding: 14px 22px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #8888aa; font-family: 'Outfit'; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { color: #f0f0ff; }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #7c3aed; }

    /* PANEL */
    .panel { display: none; max-width: 1000px; margin: 32px auto; padding: 0 20px; }
    .panel.active { display: block; }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }

    /* CARD */
    .card { background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 14px; padding: 22px; }
    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: #f0f0ff; }

    /* FORM */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.78rem; color: #8888aa; font-weight: 600; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; background: #0f0f1a;
      border: 1px solid #2a2a3d; border-radius: 8px;
      color: #f0f0ff; font-family: 'Outfit'; font-size: 0.88rem; outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder, textarea::placeholder { color: #44445a; }
    input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
    select option { background: #1a1a27; }
    textarea { resize: vertical; min-height: 68px; }

    .btn { width: 100%; padding: 10px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 0.92rem; cursor: pointer; font-family: 'Outfit'; transition: background 0.2s; margin-top: 4px; }
    .btn:hover { background: #6d28d9; }

    /* EVENT LIST */
    .item-list { display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2a2a3d transparent; }
    .item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: rgba(255,255,255,0.03);
      border: 1px solid #2a2a3d; border-radius: 8px; gap: 10px;
    }
    .item-info strong { display: block; font-size: 0.88rem; }
    .item-info span { font-size: 0.75rem; color: #8888aa; }
    .item-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* BUTTONS */
    .del-btn { padding: 5px 12px; background: transparent; border: 1px solid rgba(239,68,68,0.35); color: #ef4444; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'Outfit'; white-space: nowrap; transition: all 0.2s; }
    .del-btn:hover { background: rgba(239,68,68,0.1); }
    .view-btn { padding: 5px 12px; background: transparent; border: 1px solid rgba(124,58,237,0.4); color: #a78bfa; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'Outfit'; white-space: nowrap; transition: all 0.2s; }
    .view-btn:hover { background: rgba(124,58,237,0.1); }

    /* ROLE BADGE */
    .role-badge { padding: 2px 9px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }
    .role-alumni  { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.25); }
    .role-student { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }

    /* STAT STRIP */
    .stat-strip { display: flex; gap: 14px; margin-bottom: 20px; }
    .stat-chip { flex: 1; background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-chip h3 { font-size: 1.6rem; font-weight: 800; color: #a78bfa; }
    .stat-chip p { font-size: 0.78rem; color: #8888aa; margin-top: 2px; }

    /* EMPTY */
    .empty { color: #8888aa; font-size: 0.85rem; text-align: center; padding: 24px 0; }

    /* ATTENDEES MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.active { opacity: 1; pointer-events: all; }
    .att-modal { background: #1a1a27; border: 1px solid #2a2a3d; border-radius: 16px; width: 100%; max-width: 580px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; transform: scale(0.95); transition: transform 0.3s; }
    .overlay.active .att-modal { transform: scale(1); }
    .att-header { padding: 18px 22px; border-bottom: 1px solid #2a2a3d; display: flex; justify-content: space-between; align-items: center; }
    .att-header h3 { font-size: 1rem; font-weight: 700; }
    .att-close { background: transparent; border: none; color: #8888aa; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; }
    .att-close:hover { color: #f0f0ff; }
    .att-body { padding: 16px 22px; overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: #2a2a3d transparent; }
    .att-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #1e1e2e; }
    .att-row:last-child { border-bottom: none; }
    .att-name { font-size: 0.88rem; font-weight: 600; }
    .att-sub { font-size: 0.75rem; color: #8888aa; margin-top: 2px; }
    .att-ticket { font-size: 0.72rem; color: #a78bfa; font-family: monospace; font-weight: 700; }
    .cancel-att-btn { padding: 4px 10px; background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 5px; font-size: 0.72rem; cursor: pointer; font-family: 'Outfit'; transition: all 0.2s; }
    .cancel-att-btn:hover { background: rgba(239,68,68,0.1); }

    /* TOAST */
    .toast { position: fixed; top: 20px; right: 20px; z-index: 999; padding: 10px 18px; background: #1a1a27; border: 1px solid #7c3aed; border-radius: 10px; color: #f0f0ff; font-size: 0.85rem; font-weight: 600; opacity: 0; transform: translateY(-10px); transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: #ef4444; }

    /* SEARCH BAR */
    .search-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-bar input { flex: 1; }
    .filter-role { width: 130px; }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ATTENDEES MODAL -->
<div class="overlay" id="attOverlay">
  <div class="att-modal">
    <div class="att-header">
      <h3 id="attTitle">Attendees</h3>
      <button class="att-close" onclick="closeAttendees()">✕</button>
    </div>
    <div class="att-body" id="attBody">
      <p class="empty">Loading...</p>
    </div>
  </div>
</div>

<header>
  <div style="display:flex; align-items:center;">
    <span class="logo">AlumniPortal Pro</span>
    <span class="admin-tag">Admin</span>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab-btn active" id="tabEvents" onclick="switchTab('events')">📅 Events</button>
  <button class="tab-btn" id="tabUsers"  onclick="switchTab('users')">👥 Users</button>
</nav>

<!-- ══════════════════════════════════════════════ -->
<!--  TAB 1 — EVENTS                               -->
<!-- ══════════════════════════════════════════════ -->
<section class="panel active" id="panelEvents">
  <div class="grid-2">

    <!-- CREATE FORM -->
    <div class="card">
      <h2>➕ Create Event</h2>
      <div class="form-group"><label>Title *</label><input id="evTitle" type="text" placeholder="Event name"></div>
      <div class="form-group">
        <label>Category *</label>
        <select id="evCategory">
          <option value="Technical">Technical</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
          <option value="Career">Career</option>
          <option value="Alumni">Alumni</option>
          <option value="Workshop">Workshop</option>
          <option value="Startup">Startup</option>
          <option value="Research">Research</option>
        </select>
      </div>
      <div class="form-group"><label>Date *</label><input id="evDate" type="date"></div>
      <div class="form-group"><label>Time</label><input id="evTime" type="text" placeholder="e.g. 9:00 AM – 5:00 PM"></div>
      <div class="form-group"><label>Location</label><input id="evLocation" type="text" placeholder="e.g. Main Auditorium, LPU"></div>
      <div class="form-group"><label>Seats</label><input id="evSeats" type="number" placeholder="100" value="100"></div>
      <div class="form-group"><label>Fee</label><input id="evFee" type="text" placeholder="Free or ₹500" value="Free"></div>
      <div class="form-group"><label>Image URL (optional)</label><input id="evImg" type="url" placeholder="https://..."></div>
      <div class="form-group"><label>Description</label><textarea id="evDesc" placeholder="Brief description..."></textarea></div>
      <button class="btn" onclick="submitNewEvent()">Create Event</button>
    </div>

    <!-- EVENT LIST -->
    <div class="card">
      <h2>📋 All Events (<span id="evCount">0</span>)</h2>
      <div class="item-list" id="eventsList">
        <p class="empty">Loading...</p>
      </div>
    </div>

  </div>
</section>

<!-- ══════════════════════════════════════════════ -->
<!--  TAB 2 — USERS                                -->
<!-- ══════════════════════════════════════════════ -->
<section class="panel" id="panelUsers">

  <div class="stat-strip" id="userStats">
    <div class="stat-chip"><h3 id="statStudents">--</h3><p>Students</p></div>
    <div class="stat-chip"><h3 id="statAlumni">--</h3><p>Alumni</p></div>
    <div class="stat-chip"><h3 id="statTotal">--</h3><p>Total Users</p></div>
  </div>

  <div class="card">
    <div class="search-bar">
      <input id="userSearch" type="text" placeholder="Search by name or email..." oninput="filterUsers()">
      <select id="userRoleFilter" class="filter-role" onchange="filterUsers()">
        <option value="all">All Roles</option>
        <option value="student">Students</option>
        <option value="alumni">Alumni</option>
      </select>
    </div>
    <div class="item-list" id="usersList">
      <p class="empty">Loading...</p>
    </div>
  </div>

</section>

<script>
  const BASE_URL = `${window.location.origin}/api`;

  // ── Auth guard — admin only ────────────────────────────────
  const userId = localStorage.getItem("userId");
  const role   = localStorage.getItem("role");
  if (!userId || role !== "admin") window.location.href = "../index.html";

  // ── Toast ──────────────────────────────────────────────────
  const toastEl = document.getElementById("toast");
  function showToast(msg, type = "") {
    toastEl.innerText = msg;
    toastEl.className = `toast show ${type}`;
    setTimeout(() => toastEl.classList.remove("show"), 3000);
  }

  // ── Logout ─────────────────────────────────────────────────
  async function logout() {
    await apiFetch(`${BASE_URL}/users/logout`, { method: "POST" });
    localStorage.clear();
    window.location.href = "../index.html";
  }

  // ── Tab switching ──────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab${tab.charAt(0).toUpperCase()+tab.slice(1)}`).classList.add('active');
    document.getElementById(`panel${tab.charAt(0).toUpperCase()+tab.slice(1)}`).classList.add('active');
    if (tab === 'users' && !usersLoaded) loadUsers();
  }

  // ════════════════════════════════════════════════════════════
  //  EVENTS TAB
  // ════════════════════════════════════════════════════════════

  async function loadEvents() {
    const res = await apiFetch(`${BASE_URL}/events`);
    const events = await res.json();
    const list = document.getElementById("eventsList");
    document.getElementById("evCount").innerText = events.length;

    if (!events.length) { list.innerHTML = `<p class="empty">No events yet.</p>`; return; }

    list.innerHTML = "";
    events.forEach(ev => {
      const date = new Date(ev.date).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const div = document.createElement("div");
      div.className = "item-row";
      div.innerHTML = `
        <div class="item-info">
          <strong>${ev.title}</strong>
          <span>${ev.category} · ${date}</span>
        </div>
        <div class="item-actions">
          <button class="view-btn" onclick="openAttendees('${ev._id}', '${ev.title.replace(/'/g,"\\'")}')">Attendees</button>
          <button class="del-btn" onclick="deleteEvent('${ev._id}')">Delete</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  async function submitNewEvent() {
    const title = document.getElementById("evTitle").value.trim();
    const date  = document.getElementById("evDate").value;
    if (!title) return showToast("Title is required", "error");
    if (!date)  return showToast("Date is required", "error");

    const payload = {
      title, date,
      category: document.getElementById("evCategory").value,
      time:     document.getElementById("evTime").value.trim(),
      location: document.getElementById("evLocation").value.trim(),
      seats:    Number(document.getElementById("evSeats").value) || 100,
      fee:      document.getElementById("evFee").value.trim() || "Free",
      img:      document.getElementById("evImg").value.trim(),
      desc:     document.getElementById("evDesc").value.trim()
    };

    const res = await apiFetch(`${BASE_URL}/events/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (!res.ok) return showToast(result.error || "Failed", "error");

    showToast("✅ Event created!");
    ["evTitle","evTime","evLocation","evImg","evDesc"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("evDate").value = "";
    document.getElementById("evSeats").value = "100";
    document.getElementById("evFee").value = "Free";
    loadEvents();
  }

  async function deleteEvent(id) {
    if (!confirm("Delete this event? All registrations for it will also be lost.")) return;
    const res = await apiFetch(`${BASE_URL}/events/${id}`, { method: "DELETE" });
    const result = await res.json();
    if (!res.ok) return showToast(result.error || "Failed", "error");
    showToast("Event deleted");
    loadEvents();
  }

  // ── Attendees modal ────────────────────────────────────────
  async function openAttendees(eventId, eventTitle) {
    document.getElementById("attTitle").innerText = `Attendees — ${eventTitle}`;
    document.getElementById("attBody").innerHTML = `<p class="empty">Loading...</p>`;
    document.getElementById("attOverlay").classList.add("active");

    const res = await apiFetch(`${BASE_URL}/registrations/event/${eventId}`);
    const data = await res.json();

    const body = document.getElementById("attBody");
    if (!res.ok || !data.length) {
      body.innerHTML = `<p class="empty">No registrations yet for this event.</p>`;
      return;
    }

    body.innerHTML = data.map(reg => `
      <div class="att-row">
        <div>
          <div class="att-name">${reg.userId?.name || reg.name}</div>
          <div class="att-sub">${reg.userId?.email || reg.email} · ${reg.userId?.role || ''}</div>
          <div class="att-ticket">${reg.ticketId}</div>
        </div>
        <button class="cancel-att-btn" onclick="cancelRegistration('${reg._id}', '${eventId}', '${eventTitle.replace(/'/g,"\\'")}')">Cancel</button>
      </div>
    `).join('');
  }

  async function cancelRegistration(regId, eventId, eventTitle) {
    if (!confirm("Cancel this registration?")) return;
    const res = await apiFetch(`${BASE_URL}/registrations/${regId}`, { method: "DELETE" });
    if (!res.ok) { showToast("Failed to cancel", "error"); return; }
    showToast("Registration cancelled");
    openAttendees(eventId, eventTitle); // refresh list
  }

  function closeAttendees() {
    document.getElementById("attOverlay").classList.remove("active");
  }

  // ════════════════════════════════════════════════════════════
  //  USERS TAB
  // ════════════════════════════════════════════════════════════

  let allUsers = [];
  let usersLoaded = false;

  async function loadUsers() {
    usersLoaded = true;
    const res = await apiFetch(`${BASE_URL}/users/admin/all-users`);
    if (!res.ok) { document.getElementById("usersList").innerHTML = `<p class="empty">Could not load users.</p>`; return; }
    allUsers = await res.json();

    // Stats
    const students = allUsers.filter(u => u.role === "student").length;
    const alumni   = allUsers.filter(u => u.role === "alumni").length;
    document.getElementById("statStudents").innerText = students;
    document.getElementById("statAlumni").innerText   = alumni;
    document.getElementById("statTotal").innerText    = allUsers.length;

    renderUsers(allUsers);
  }

  function filterUsers() {
    const q    = document.getElementById("userSearch").value.toLowerCase();
    const role = document.getElementById("userRoleFilter").value;
    const filtered = allUsers.filter(u => {
      const matchRole = role === "all" || u.role === role;
      const matchQ    = !q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
      return matchRole && matchQ;
    });
    renderUsers(filtered);
  }

  function renderUsers(users) {
    const list = document.getElementById("usersList");
    if (!users.length) { list.innerHTML = `<p class="empty">No users found.</p>`; return; }

    list.innerHTML = "";
    users.forEach(u => {
      const joined = new Date(u.createdAt).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const div = document.createElement("div");
      div.className = "item-row";
      div.innerHTML = `
        <div class="item-info" style="flex:1">
          <strong>${u.name}</strong>
          <span>${u.email} · Joined ${joined}</span>
        </div>
        <span class="role-badge role-${u.role}">${u.role}</span>
        <div class="item-actions" style="margin-left:10px">
          <button class="del-btn" onclick="deleteUser('${u._id}', '${u.name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    const res = await apiFetch(`${BASE_URL}/users/admin/delete/${id}`, { method: "DELETE" });
    const result = await res.json();
    if (!res.ok) return showToast(result.error || "Failed", "error");
    showToast(`User "${name}" deleted`);
    loadUsers();
  }

  // ── Init ───────────────────────────────────────────────────
  loadEvents();
</script>
</body>
</html>
